# ─────────────────────────────────────────────────────────────────────────────
# Élan Traiteur — nginx production configuration
# Optimised for: EasyPanel · reverse proxy · SPA (React) · static assets
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen       80;
    listen       [::]:80;
    server_name  _;                     # accept any hostname (EasyPanel routes by domain)

    root  /usr/share/nginx/html;
    index index.html;

    # ── Charset & MIME ──────────────────────────────────────────────────────
    charset utf-8;

    # ── Security headers ────────────────────────────────────────────────────
    # Hide nginx version
    server_tokens off;

    add_header X-Frame-Options           "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy — adjust if you add external scripts later
    add_header Content-Security-Policy
        "default-src 'self';
         script-src  'self' 'unsafe-inline';
         style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src    'self' https://fonts.gstatic.com;
         img-src     'self' data: https://images.unsplash.com;
         connect-src 'self';
         frame-ancestors 'none';"
        always;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ── Static asset caching ────────────────────────────────────────────────
    # Vite fingerprints JS/CSS bundles → safe to cache forever
    location ~* \.(?:js|css|woff2?|ttf|otf|eot)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # Images
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires     30d;
        add_header  Cache-Control "public, no-transform";
        access_log  off;
    }

    # ── Healthcheck endpoint (used by Docker HEALTHCHECK + EasyPanel) ────────
    location = /health {
        access_log  off;
        return 200  "OK\n";
        add_header  Content-Type text/plain;
    }

    # ── Block hidden files (.git, .env, .htaccess …) ────────────────────────
    location ~ /\. {
        deny all;
        access_log  off;
        log_not_found off;
    }

    # ── Prevent directory listing ────────────────────────────────────────────
    autoindex off;

    # ── SPA fallback: all unknown paths → index.html ─────────────────────────
    # React Router / client-side routing works correctly
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";  # never cache HTML
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # ── Error pages ──────────────────────────────────────────────────────────
    error_page 404 /index.html;   # SPA handles 404s itself
    error_page 500 502 503 504 /index.html;
}
